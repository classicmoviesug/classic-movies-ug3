<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Movie Preview</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="/static/styles.css" />
</head>

<body>
<header class="navbar">
  <div class="nav-left">Classic Movies Ug</div>
  <div class="nav-right">
    <a href="/">Home</a>
    <a href="/#movie-groups">Movies</a>
  </div>
</header>

<main class="player-container">
  <h1 id="movieTitle">Loading...</h1>

  <video id="moviePlayer" controls width="100%" poster="">
    <source id="movieSource" src="" type="video/mp4" />
    Your browser does not support the video tag.
  </video>

  <!-- Fake duration display -->
  <p id="fakeTime" style="margin-top:8px;color:#bbb;font-size:14px;">
    00:00 / 01:42:00
  </p>

  <!-- Lock overlay -->
  <div id="lockOverlay" class="lock-overlay" style="display:none;">
    <div class="lock-box">
      <h2>🔒 Preview Ended</h2>
      <p>Buy to continue watching this movie</p>
      <button id="overlayBuyBtn">▶ Buy to Continue</button>
    </div>
  </div>

  <a href="#" id="buyButton" class="buy-link">
    ▶ Buy Full Movie – UGX 500
  </a>
</main>

<footer class="footer">© 2026 Classic Movies • Uganda</footer>

<!-- Payment popup -->
<div id="paymentPopup" class="popup-overlay" style="display:none;">
  <div class="popup-content">
    <h2>Mobile Money Payment</h2>
    <p>Enter your Mobile Money number to pay UGX 500</p>
    <input type="text" id="mobileNumber" placeholder="e.g. 0700123456" />
    <button id="payButton">Pay Now</button>
    <button id="closePopup">Cancel</button>
    <p id="paymentMessage"></p>
  </div>
</div>

<script>
/* ================= SETTINGS ================= */
const PREVIEW_SECONDS = 10;              // real preview length
const FAKE_TOTAL_SECONDS = 6120;         // 1h 42m fake duration

let currentMovie = null;
let isUnlocked = false;

/* ================= HELPERS ================= */
function getMovieId() {
  return new URLSearchParams(window.location.search).get("movie");
}

function formatTime(sec) {
  sec = Math.floor(sec);
  const h = Math.floor(sec / 3600);
  const m = Math.floor((sec % 3600) / 60);
  const s = sec % 60;
  return (h ? String(h).padStart(2,"0")+":" : "")
       + String(m).padStart(2,"0")+":"
       + String(s).padStart(2,"0");
}

/* ================= LOAD MOVIE ================= */
async function loadMovie() {
  const movieId = getMovieId();
  const res = await fetch("/movies");
  const movies = await res.json();

  currentMovie = movies.find(m => String(m.id) === String(movieId));
  if (!currentMovie) {
    document.getElementById("movieTitle").textContent = "Movie not found";
    return;
  }

  document.title = currentMovie.title;
  document.getElementById("movieTitle").textContent = currentMovie.title;

  const video = document.getElementById("moviePlayer");
  const source = document.getElementById("movieSource");

  source.src = currentMovie.preview || currentMovie.movie;
  video.poster = currentMovie.poster || "";
  video.load();
}

/* ================= PREVIEW LOCK ================= */
function setupPreview() {
  const video = document.getElementById("moviePlayer");
  const fakeTime = document.getElementById("fakeTime");
  const lockOverlay = document.getElementById("lockOverlay");

  video.addEventListener("timeupdate", () => {
    if (!isUnlocked) {
      // ✅ fake time moves 1:1 with real time
      fakeTime.textContent =
        `${formatTime(video.currentTime)} / ${formatTime(FAKE_TOTAL_SECONDS)}`;

      if (video.currentTime >= PREVIEW_SECONDS) {
        video.pause();
        video.currentTime = PREVIEW_SECONDS;
        lockOverlay.style.display = "flex";
      }
    }
  });

  video.addEventListener("seeking", () => {
    if (!isUnlocked && video.currentTime > PREVIEW_SECONDS) {
      video.currentTime = PREVIEW_SECONDS;
    }
  });
}

/* ================= PAYMENT ================= */
const buyButton = document.getElementById("buyButton");
const overlayBuyBtn = document.getElementById("overlayBuyBtn");
const paymentPopup = document.getElementById("paymentPopup");
const paymentMessage = document.getElementById("paymentMessage");
const mobileNumberInput = document.getElementById("mobileNumber");

function openPaymentPopup() {
  paymentPopup.style.display = "flex";
  paymentMessage.textContent = "";
  mobileNumberInput.value = "";
}

buyButton.onclick = e => { e.preventDefault(); openPaymentPopup(); };
overlayBuyBtn.onclick = e => { e.preventDefault(); openPaymentPopup(); };

document.getElementById("closePopup").onclick = () => {
  paymentPopup.style.display = "none";
};

document.getElementById("payButton").onclick = async () => {
  const phone = mobileNumberInput.value.trim();
  if (phone.length < 9) {
    paymentMessage.textContent = "Enter a valid number";
    return;
  }

  paymentMessage.textContent = "Processing payment...";

  const res = await fetch("/pay", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      phone,
      amount: 500,
      movie_id: getMovieId()
    })
  });

  const data = await res.json();
  if (data.data?.link) {
    window.location.href = data.data.link;
  } else {
    paymentMessage.textContent = "Payment failed";
  }
};

/* ================= INIT ================= */
window.onload = async () => {
  await loadMovie();
  setupPreview();
};
</script>
</body>
</html>
