<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Movie – Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{background:#0b0b0b;color:white;font-family:Arial,sans-serif;padding:20px;}
h1{color:#e50914;text-align:center;}
form{max-width:500px;margin:auto;background:#111;padding:20px;border-radius:10px;}
label{display:block;margin-top:15px;margin-bottom:5px;}
input,select,button{width:100%;padding:10px;border-radius:5px;border:none;font-size:16px;}
button{background:#e50914;color:white;margin-top:20px;cursor:pointer;font-weight:bold;}
button:hover{background:#b00710;}
.msg{text-align:center;margin-top:15px;}
progress{width:100%; display:block; margin-top:10px;}
</style>
</head>
<body>
<h1>Add New Movie</h1>
<form id="movieForm">
<label>Movie Title</label>
<input type="text" id="title">

<label>Category</label>
<select id="category">
<option value="">Select category</option>
<option value="action">Action</option>
<option value="scifi">Sci-Fi</option>
<option value="cartoon">Cartoon</option>
<option value="Teen">Teen</option>
<option value="Horror_Thriller">Horror / Thriller</option>
<option value="inspirational">Inspirational</option>
</select>

<label>Poster Image</label>
<input type="file" id="poster" accept="image/*">

<label>Set as Banner?</label>
<select id="isBanner">
<option value="no">No</option>
<option value="yes">Yes</option>
</select>

<label>Preview File (15s clip)</label>
<input type="file" id="preview" accept="video/*">

<label>Full Movie File</label>
<input type="file" id="movie" accept="video/*">

<progress id="progressBar" value="0" max="100"></progress>
<span id="progressText"></span>

<button type="submit">Upload Movie</button>
<div class="msg" id="msg"></div>
</form>

<script>
// ---------------- CONFIG ----------------
const R2_PUBLIC_URL = "YOUR_PUBLIC_BUCKET_URL_HERE"; // replace with your .env value
const form = document.getElementById("movieForm");
const msg = document.getElementById("msg");
const progressBar = document.getElementById("progressBar");
const progressText = document.getElementById("progressText");

// Upload file directly to R2 with progress
async function uploadFile(file, folder) {
    return new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        const url = `${R2_PUBLIC_URL}/${folder}/${file.name}`;
        xhr.open("PUT", url);

        xhr.upload.onprogress = e => {
            if (e.lengthComputable) {
                const percent = Math.floor((e.loaded / e.total) * 100);
                progressBar.value = percent;
                progressText.innerText = percent + "%";
            }
        };

        xhr.onload = () => {
            if (xhr.status >= 200 && xhr.status < 300) resolve(url);
            else reject(new Error("Upload failed"));
        };

        xhr.onerror = () => reject(new Error("Network error"));
        xhr.send(file);
    });
}

form.addEventListener("submit", async e => {
    e.preventDefault();
    const title = document.getElementById("title").value;
    const category = document.getElementById("category").value;
    const poster = document.getElementById("poster").files[0];
    const preview = document.getElementById("preview").files[0];
    const movie = document.getElementById("movie").files[0];
    const isBanner = document.getElementById("isBanner").value;

    if(isBanner === "no" && (!title || !category || !poster || !preview || !movie)) {
        msg.innerText = "❌ Fill all fields for a movie";
        return;
    }
    msg.innerText = isBanner==="yes" ? "Uploading banner..." : "Uploading movie files...";
    progressBar.value = 0;
    progressText.innerText = "0%";

    try {
        // Upload files to R2
        const posterURL = poster ? await uploadFile(poster,"posters") : "";
        const previewURL = preview ? await uploadFile(preview,"previews") : "";
        const movieURL = movie ? await uploadFile(movie,"movies") : "";

        // Send movie info to Render
        const res = await fetch("/save-movie",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                title,
                category,
                poster: posterURL,
                preview: previewURL,
                movie: movieURL,
                is_banner: isBanner
            })
        });
        const data = await res.json();
        msg.innerText = data.status==="success" ? "✅ Movie info saved!" : "❌ " + data.message;
        form.reset();
        progressBar.value = 0;
        progressText.innerText = "";
    } catch(err) {
        msg.innerText = "❌ Upload failed: " + err.message;
    }
});
</script>
</body>
</html>
